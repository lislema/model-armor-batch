name: Go DevSecOps CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  checks: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ---------------- BUILD + TEST + LINT ----------------
  build-test:
    name: Build, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.5'

      - name: Show Go version
        run: go version

      - name: Install dependencies
        run: go mod tidy

      # ---------------- LINT ----------------
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
          | sh -s -- -b $(go env GOPATH)/bin v1.64.8

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

      # ---------------- BUILD ----------------
      - name: Build
        run: go build -v ./...

      # ---------------- TEST + REPORT ----------------
      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report@latest

      - name: Run tests and generate report
        run: |
          go test -v ./... 2>&1 | tee test.log
          cat test.log | go-junit-report > report.xml

      - name: Publish test results (UI)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: dorny/test-reporter@v1
        with:
          name: Go Tests
          path: report.xml
          reporter: java-junit

      # ---------------- COVERAGE ----------------
      - name: Generate coverage
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Enforce coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          THRESHOLD=60
          COVERAGE_INT=${COVERAGE%.*}
          if [ "$COVERAGE_INT" -lt "$THRESHOLD" ]; then
            echo "❌ Coverage below threshold ($THRESHOLD%)"
            exit 1
          else
            echo "✅ Coverage meets threshold"
          fi

  # ---------------- SECURITY ----------------
  security:
    name: Security Scan (gosec)
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.5'

      - name: Install dependencies
        run: go mod tidy

      # ---------------- INSTALL GOSEC ----------------
      - name: Install gosec (pinned)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.0

      # ---------------- GOSEC ENFORCEMENT ----------------
      - name: Run gosec (fail on HIGH)
        run: |
          gosec -severity high -confidence high ./...

      # ---------------- SARIF REPORT ----------------
      - name: Generate SARIF report
        run: |
          gosec -no-fail -fmt sarif -out results.sarif ./...

      # ---------------- UPLOAD SARIF ----------------
      - name: Upload SARIF to GitHub Security
        if: github.event_name == 'push' && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif